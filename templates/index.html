<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawn Wars | Training Arena</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&family=Sora:wght@400;600;700&display=swap');

    :root {
      --bg-1: #00b5d8;
      --bg-2: #ff8a00;
      --bg-3: #2ec27e;
      --bg-4: #ff4d6d;
      --panel: rgba(14, 30, 72, 0.24);
      --panel-border: rgba(255, 255, 255, 0.35);
      --text-main: #f9fbff;
      --shadow: 0 20px 40px rgba(9, 19, 52, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text-main);
      font-family: "Sora", "Trebuchet MS", sans-serif;
      background: linear-gradient(120deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
      background-size: 300% 300%;
      animation: gradientFlow 14s ease infinite;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(2px);
      opacity: 0.5;
    }

    body::before {
      width: 340px;
      height: 340px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0));
      top: -110px;
      left: -70px;
      animation: drift 16s ease-in-out infinite;
    }

    body::after {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle at 70% 40%, rgba(255, 243, 165, 0.6), rgba(255, 243, 165, 0));
      right: -140px;
      bottom: -140px;
      animation: drift 18s ease-in-out infinite reverse;
    }

    #topHeader {
      margin: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 16px;
      animation: fadeUp 0.55s ease;
    }

    #topHeader img {
      height: 56px;
      width: 56px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.72);
      padding: 5px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    #titleWrap h1 {
      margin: 0;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
      font-size: clamp(1.1rem, 2vw, 1.65rem);
      letter-spacing: 0.25px;
      text-align: center;
    }

    #header {
      margin: 0 16px 16px;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid var(--panel-border);
      background: rgba(8, 28, 70, 0.35);
      backdrop-filter: blur(7px);
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.2rem);
      position: sticky;
      top: 8px;
      z-index: 20;
      box-shadow: var(--shadow);
      animation: fadeUp 0.7s ease;
    }

    #currentTurn {
      font-weight: 700;
      color: #fff7c7;
    }

    .container {
      display: flex;
      gap: 18px;
      padding: 0 16px 16px;
      align-items: flex-start;
    }

    .board-container,
    .info-container,
    .history-container {
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .board-container {
      flex: 1 1 420px;
      padding: 16px;
      animation: fadeUp 0.8s ease;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 110px));
      grid-template-rows: repeat(3, minmax(88px, 110px));
      justify-content: center;
      gap: 8px;
      animation: boardFloat 4.8s ease-in-out infinite;
    }

    .cell {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      transition: transform 0.2s ease;
      overflow: hidden;
    }

    .cell:hover {
      transform: translateY(-2px);
    }

    .cell.light {
      background: linear-gradient(135deg, rgba(230, 253, 255, 0.86), rgba(183, 240, 255, 0.74));
    }

    .cell.dark {
      background: linear-gradient(135deg, rgba(76, 163, 255, 0.72), rgba(33, 97, 213, 0.72));
    }

    .white,
    .black {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
      font-size: 33px;
      box-shadow: 0 8px 18px rgba(12, 18, 42, 0.32);
      animation: popIn 0.2s ease;
      user-select: none;
    }

    .white {
      color: #173d70;
      background: linear-gradient(145deg, #ffffff, #cde4ff);
      border: 2px solid rgba(255, 255, 255, 0.65);
    }

    .black {
      color: #f8fbff;
      background: linear-gradient(145deg, #132046, #001d51);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      color: #ffffff;
      font-weight: 700;
      padding: 11px 19px;
      font-family: "Sora", "Trebuchet MS", sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 14px 22px rgba(0, 0, 0, 0.24);
    }

    #moveButton {
      background: linear-gradient(120deg, #ff9e2f, #ff5d8f);
    }

    #playComputer {
      background: linear-gradient(120deg, #2ec27e, #00b5d8);
    }

    .info-container {
      flex: 1 1 460px;
      padding: 16px;
      animation: fadeUp 0.95s ease;
    }

    .info-container h3 {
      margin: 0 0 12px;
      text-align: center;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.35px;
    }

    #boardCopies {
      max-height: 74vh;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      padding-right: 4px;
    }

    .mini-board-container {
      position: relative;
      width: 154px;
      min-height: 202px;
      padding-bottom: 8px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(8, 26, 74, 0.34);
      box-shadow: 0 10px 20px rgba(5, 12, 36, 0.28);
      animation: cardRise 0.32s ease;
    }

    .mini-board {
      display: grid;
      grid-template-columns: repeat(3, 50px);
      grid-template-rows: repeat(3, 50px);
    }

    .mini-cell {
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
    }

    /* Mini piece styling: separate element so piece color isn't inherited from the cell */
    .mini-piece {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
      font-size: 20px;
      box-shadow: 0 6px 12px rgba(12, 18, 42, 0.24);
      user-select: none;
    }

    .mini-piece.white {
      color: #173d70;
      background: linear-gradient(145deg, #ffffff, #cde4ff);
      border: 1.5px solid rgba(255, 255, 255, 0.72);
    }

    .mini-piece.black {
      color: #f8fbff;
      background: linear-gradient(145deg, #132046, #001d51);
      border: 1.5px solid rgba(255, 255, 255, 0.28);
    }

    .mini-cell.light {
      background: rgba(235, 251, 255, 0.85);
      color: #183b66;
    }

    .mini-cell.dark {
      background: rgba(42, 122, 233, 0.8);
      color: #f4faff;
    }

    .qvalue-label,
    .reward-label {
      text-align: center;
      font-size: 0.86rem;
      margin-top: 6px;
      font-weight: 600;
    }

    .rewarded { color: #9cffc7; }
    .penalized { color: #ffd3d9; }

    #gameHistory {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 14px;
      padding: 0 16px 18px;
      overflow-x: auto;
    }

    .history-container {
      flex: 1 1 0;
      min-width: 0;
      min-height: 150px;
      max-height: 320px;
      overflow-y: auto;
      padding: 10px;
      animation: fadeUp 1.1s ease;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 12px;
    }

    .history-container h4 {
      width: 100%;
      margin: 2px 0 10px;
      text-align: center;
      font-family: "Exo 2", "Trebuchet MS", sans-serif;
      font-size: 1.08rem;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -18px) scale(1.08); }
    }

    @keyframes boardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0.65; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1080px) {
      .container {
        flex-direction: column;
      }

      .board-container,
      .info-container {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      #topHeader {
        flex-direction: column;
        text-align: center;
      }

      .board {
        grid-template-columns: repeat(3, minmax(78px, 96px));
        grid-template-rows: repeat(3, minmax(78px, 96px));
        gap: 6px;
      }

      .white,
      .black {
        width: 48px;
        height: 48px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="topHeader">
    <img src="{{ url_for('static', filename='img/iisc-logo.png') }}" alt="IISc Logo">
    <div id="titleWrap">
      <h1>Pawn Wars at Department of Computer Science and Automation, IISc</h1>
    </div>
  </div>

  <div id="header">
    Current turn: <span id="currentTurn">White</span>
  </div>

  <div class="container">
    <div class="board-container" id="boardContainer">
      <div id="board" class="board"></div>
      <div class="controls">
        <button id="moveButton">Play Game</button>
        <button id="playComputer">Play Against Computer</button>
      </div>
    </div>
    <div class="info-container">
      <h3>Candidate Moves</h3>
      <div id="boardCopies"></div>
    </div>
  </div>

  <div id="gameHistory">
    <div id="whiteHistoryDiv" class="history-container">
      <h4>White History</h4>
    </div>
    <div id="blackHistoryDiv" class="history-container">
      <h4>Black History</h4>
    </div>
  </div>

  <script>
    let gameID = null;
    let isStarted = false;
    let gameOver = false;
    // Client history: array of objects { player, from, to, snapshot, chosenQ }
    // "snapshot" is the board state before the move.
    let clientHistory = [];

    const WHITE_PAWN = '\u2659';
    const BLACK_PAWN = '\u265F';

    const boardElement = document.getElementById('board');
    const boardCopiesContainer = document.getElementById('boardCopies');
    const currentTurnEl = document.getElementById('currentTurn');
    const whiteHistoryDiv = document.getElementById('whiteHistoryDiv');
    const blackHistoryDiv = document.getElementById('blackHistoryDiv');

    const files = ['a', 'b', 'c'];
    const ranks = [3, 2, 1];  // top row is rank 3
    let boardState = {};

    function initializeBoardState() {
      boardState = {
        'a1': 'W', 'b1': 'W', 'c1': 'W',
        'a3': 'B', 'b3': 'B', 'c3': 'B'
      };
    }

    function drawBoard() {
      boardElement.innerHTML = '';
      for (let r of ranks) {
        for (let f of files) {
          const cellId = f + r;
          const cell = document.createElement('div');
          cell.classList.add('cell');
          const isLight = (files.indexOf(f) + r) % 2 === 0;
          cell.classList.add(isLight ? 'light' : 'dark');
          cell.id = cellId;
          if (boardState[cellId]) {
            const piece = document.createElement('div');
            piece.textContent = boardState[cellId] === 'W' ? WHITE_PAWN : BLACK_PAWN;
            piece.classList.add(boardState[cellId] === 'W' ? 'white' : 'black');
            cell.appendChild(piece);
          }
          boardElement.appendChild(cell);
        }
      }
    }

    // Simulate a move on a board (non-mutating)
    function simulateMove(board, action) {
      const src = action.substring(0, 2);
      const dest = action.substring(2, 4);
      const newBoard = JSON.parse(JSON.stringify(board));
      if (newBoard[dest]) { delete newBoard[dest]; }
      newBoard[dest] = newBoard[src];
      delete newBoard[src];
      return newBoard;
    }

    // Render a candidate move preview (right pane)
    function renderBoardCopy(action, qValue, currentBoardState) {
      const newBoard = simulateMove(currentBoardState, action);

      const container = document.createElement('div');
      container.classList.add('mini-board-container');

      const miniBoard = document.createElement('div');
      miniBoard.classList.add('mini-board');
      for (let r of [3, 2, 1]) {
        for (let f of files) {
          const cellId = f + r;
          const cell = document.createElement('div');
          cell.classList.add('mini-cell');
          const isLight = (files.indexOf(f) + r) % 2 === 0;
          cell.classList.add(isLight ? 'light' : 'dark');
          if (newBoard[cellId]) {
            const piece = document.createElement('div');
            piece.classList.add('mini-piece', newBoard[cellId] === 'W' ? 'white' : 'black');
            piece.textContent = newBoard[cellId] === 'W' ? WHITE_PAWN : BLACK_PAWN;
            cell.appendChild(piece);
          }
          miniBoard.appendChild(cell);
        }
      }
      container.appendChild(miniBoard);

      const miniSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      miniSvg.setAttribute('width', '150');
      miniSvg.setAttribute('height', '150');
      miniSvg.style.position = 'absolute';
      miniSvg.style.top = '0';
      miniSvg.style.left = '0';
      miniSvg.style.pointerEvents = 'none';
      container.appendChild(miniSvg);

      if (!document.getElementById('miniArrowhead')) {
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute('id', 'miniArrowhead');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('refX', '0');
        marker.setAttribute('refY', '3');
        marker.setAttribute('orient', 'auto');
        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute('points', '0 0, 6 3, 0 6');
        polygon.setAttribute('fill', '#0c265d');
        marker.appendChild(polygon);
        defs.appendChild(marker);
        miniSvg.appendChild(defs);
      }

      function getMiniCellCenter(cellCoord, cellSize = 50) {
        const file = cellCoord[0];
        const rank = parseInt(cellCoord[1], 10);
        const col = files.indexOf(file);
        const row = 3 - rank;
        return { x: col * cellSize + cellSize / 2, y: row * cellSize + cellSize / 2 };
      }

      const src = action.substring(0, 2);
      const dest = action.substring(2, 4);
      const fromCenter = getMiniCellCenter(src);
      const toCenter = getMiniCellCenter(dest);

      const svgns = "http://www.w3.org/2000/svg";
      const line = document.createElementNS(svgns, 'line');
      line.setAttribute('x1', fromCenter.x);
      line.setAttribute('y1', fromCenter.y);
      line.setAttribute('x2', toCenter.x);
      line.setAttribute('y2', toCenter.y);
      line.setAttribute('stroke', '#0d2f78');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('marker-end', 'url(#miniArrowhead)');
      miniSvg.appendChild(line);

      const label = document.createElement('div');
      label.classList.add('qvalue-label');
      label.textContent = `Q-value: ${qValue}`;
      container.appendChild(label);

      return container;
    }

    // Render a history move preview using a snapshot (before the move) and the chosen action.
    // rewardStatus is a string ("rewarded" or "penalized") when game is over.
    function renderHistoryMove(snapshot, action, player, rewardStatus = "") {
      const boardAfterMove = simulateMove(snapshot, action);
      const container = document.createElement('div');
      container.classList.add('mini-board-container');

      const miniBoard = document.createElement('div');
      miniBoard.classList.add('mini-board');
      for (let r of [3, 2, 1]) {
        for (let f of files) {
          const cellId = f + r;
          const cell = document.createElement('div');
          cell.classList.add('mini-cell');
          const isLight = (files.indexOf(f) + r) % 2 === 0;
          cell.classList.add(isLight ? 'light' : 'dark');
          if (boardAfterMove[cellId]) {
            const piece = document.createElement('div');
            piece.classList.add('mini-piece', boardAfterMove[cellId] === 'W' ? 'white' : 'black');
            piece.textContent = boardAfterMove[cellId] === 'W' ? WHITE_PAWN : BLACK_PAWN;
            cell.appendChild(piece);
          }
          miniBoard.appendChild(cell);
        }
      }
      container.appendChild(miniBoard);

      const miniSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      miniSvg.setAttribute('width', '150');
      miniSvg.setAttribute('height', '150');
      miniSvg.style.position = 'absolute';
      miniSvg.style.top = '0';
      miniSvg.style.left = '0';
      miniSvg.style.pointerEvents = 'none';
      container.appendChild(miniSvg);

      if (!document.getElementById('miniArrowhead')) {
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute('id', 'miniArrowhead');
        marker.setAttribute('markerWidth', '6');
        marker.setAttribute('markerHeight', '6');
        marker.setAttribute('refX', '0');
        marker.setAttribute('refY', '3');
        marker.setAttribute('orient', 'auto');
        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute('points', '0 0, 6 3, 0 6');
        polygon.setAttribute('fill', '#0c265d');
        marker.appendChild(polygon);
        defs.appendChild(marker);
        miniSvg.appendChild(defs);
      }

      function getMiniCellCenter(cellCoord, cellSize = 50) {
        const file = cellCoord[0];
        const rank = parseInt(cellCoord[1], 10);
        const col = files.indexOf(file);
        const row = 3 - rank;
        return { x: col * cellSize + cellSize / 2, y: row * cellSize + cellSize / 2 };
      }

      const src = action.substring(0, 2);
      const dest = action.substring(2, 4);
      const fromCenter = getMiniCellCenter(src);
      const toCenter = getMiniCellCenter(dest);

      const svgns = "http://www.w3.org/2000/svg";
      const line = document.createElementNS(svgns, 'line');
      line.setAttribute('x1', fromCenter.x);
      line.setAttribute('y1', fromCenter.y);
      line.setAttribute('x2', toCenter.x);
      line.setAttribute('y2', toCenter.y);
      line.setAttribute('stroke', '#0d2f78');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('marker-end', 'url(#miniArrowhead)');
      miniSvg.appendChild(line);

      const label = document.createElement('div');
      label.classList.add('reward-label');
      label.textContent = `${action} ${rewardStatus}`;
      if (rewardStatus === "rewarded") { label.classList.add('rewarded'); }
      else if (rewardStatus === "penalized") { label.classList.add('penalized'); }
      container.appendChild(label);

      return container;
    }

    // Update candidate move previews (right pane)
    function updateBoardCopies(qActions, qValues) {
      boardCopiesContainer.innerHTML = '';
      qActions.forEach((action, index) => {
        const copyEl = renderBoardCopy(action, qValues[index], boardState);
        boardCopiesContainer.appendChild(copyEl);
      });
    }

    // Update visual history for both white and black moves.
    function updateHistoryVisual(winner = null) {
      whiteHistoryDiv.innerHTML = '<h4>White History</h4>';
      blackHistoryDiv.innerHTML = '<h4>Black History</h4>';
      clientHistory.forEach(moveObj => {
        let rewardStatus = "";
        if (gameOver && winner) {
          const normalizedWinner = winner.toLowerCase();
          if ((moveObj.player === "white" && (normalizedWinner === "w" || normalizedWinner === "white")) ||
              (moveObj.player === "black" && (normalizedWinner === "b" || normalizedWinner === "black"))) {
            rewardStatus = "rewarded";
          } else {
            rewardStatus = "penalized";
          }
        }
        const historyEl = renderHistoryMove(moveObj.snapshot, moveObj.from + moveObj.to, moveObj.player, rewardStatus);
        if (moveObj.player === "white") {
          whiteHistoryDiv.appendChild(historyEl);
          historyEl.scrollIntoView({ behavior: "smooth", block: "end" });
        } else {
          blackHistoryDiv.appendChild(historyEl);
          historyEl.scrollIntoView({ behavior: "smooth", block: "end" });
        }
      });
    }

    // Update header display for turn or game over.
    function updateTurnDisplay(winner = null) {
      if (!gameOver) {
        const lastMove = clientHistory[clientHistory.length - 1];
        const nextTurn = (lastMove && lastMove.player === "white") ? "Black" : "White";
        currentTurnEl.textContent = `${nextTurn} to move`;
      } else {
        const normalizedWinner = winner.toLowerCase();
        const winnerDisplay = (normalizedWinner.startsWith("w") || normalizedWinner === "white") ? "White" : "Black";
        currentTurnEl.textContent = `Game Over - Winner: ${winnerDisplay}`;
      }
    }

    // Process a move response from the backend.
    function updateMove(data) {
      // If backend indicates game over, mark it.
      if (data.message && data.message === "Game Over") {
        gameOver = true;
      }

      // Take snapshot of board state before applying move.
      const snapshot = JSON.parse(JSON.stringify(boardState));

      // Update board state.
      const src = data.from;
      const dst = data.to;
      const player = data.player;
      if (boardState[dst]) { delete boardState[dst]; }
      boardState[dst] = (player === 'white') ? 'W' : 'B';
      delete boardState[src];
      drawBoard();

      // Update candidate move previews if provided.
      if (data.qvalues) {
        updateBoardCopies(data.qvalues.actions, data.qvalues.values);
      }

      // Record the move with its snapshot.
      clientHistory.push({ player: player, from: src, to: dst, snapshot: snapshot, chosenQ: "N/A" });

      updateHistoryVisual(data.winner);
      updateTurnDisplay(data.winner);
    }

    // Button click: start/resume or continue game.
    document.getElementById('playComputer').addEventListener('click', function () {
      // Redirect to /play
      window.location.href = '/play';
    });
    document.getElementById('moveButton').addEventListener('click', function () {
      // If game is over, reset for a new game.
      if (gameOver) {
        clientHistory = [];
        gameOver = false;
        isStarted = false;
        initializeBoardState();
        drawBoard();
        updateHistoryVisual();
        updateTurnDisplay();
        boardCopiesContainer.innerHTML = '';
        gameID = null;
      }
      if (!isStarted) {
        fetch('/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ gameID: gameID })
        })
        .then(response => response.json())
        .then(data => {
          console.log(data);
          gameID = data.gameID;
          isStarted = true;
          updateMove(data);
        });
      } else {
        fetch('/continue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ gameID: gameID })
        })
        .then(response => response.json())
        .then(data => {
          console.log(data);
          updateMove(data);
        });
      }
    });

    // Initialize game on page load.
    initializeBoardState();
    drawBoard();
    updateTurnDisplay();
  </script>
</body>
</html>
